
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.page { max-width: 600px; margin: 0 auto; padding: 50px; font-family: var(--font-sans); font-size: 12px; color: var(--color-text-primary); }
h1 { font-size: 30px; font-weight: 700; margin-bottom: 4px; }
.subhead { font-size: 20px; font-weight: 700; margin: 24px 0 16px; }
.field-group { margin-bottom: 16px; }
.field-label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; margin-bottom: 5px; display: block; }
select, input[type="text"], input[type="date"] {
  width: 100%; padding: 8px 10px; font-size: 12px;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
}
select:focus, input:focus { outline: none; border-color: var(--color-border-primary); box-shadow: 0 0 0 2px rgba(0,0,0,0.06); }
hr { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 24px 0; }
.output-box {
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 1.25rem 1.5rem;
  margin-top: 24px;
}
.output-label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.filename { font-family: var(--font-mono); font-size: 13px; color: var(--color-text-primary); word-break: break-all; line-height: 1.6; }
.copy-btn {
  margin-top: 12px; padding: 7px 16px; font-size: 12px;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  cursor: pointer; font-family: var(--font-sans);
}
.copy-btn:hover { background: var(--color-background-secondary); }
</style>

<div class="page">
  <h2 class="sr-only">Filename builder form</h2>
  <h1>Filename Builder</h1>

  <div class="subhead">Brand &amp; Product</div>

  <div class="field-group">
    <label class="field-label">Brand</label>
    <select id="brand">
      <option value="">— select —</option>
      <option value="walden">walden</option>
      <option value="waldentrailblazers">waldentrailblazers</option>
      <option value="waldenreserve">waldenreserve</option>
      <option value="waldenreservecarbonoffset">waldenreservecarbonoffset</option>
      <option value="waldensnowcaps">waldensnowcaps</option>
      <option value="bonbon">bonbon</option>
      <option value="batonsdebon bon">batonsdebon bon</option>
      <option value="plume">plume</option>
      <option value="plumeblunts">plumeblunts</option>
      <option value="cascadecrest">cascadecrest</option>
      <option value="cascadecrestvapes">cascadecrestvapes</option>
      <option value="cascadecrestcrush">cascadecrestcrush</option>
      <option value="cascadecrestmellows">cascadecrestmellows</option>
      <option value="puffy">puffy</option>
      <option value="puffysodashoppe">puffysodashoppe</option>
      <option value="shotskis">shotskis</option>
      <option value="thedrink">thedrink</option>
      <option value="retired">retired brand (type below)</option>
    </select>
    <input type="text" id="brand-other" placeholder="retired brand name" style="margin-top:6px; display:none;" />
  </div>

  <div class="field-group">
    <label class="field-label">Line Designation</label>
    <select id="line">
      <option value="na">na (none)</option>
      <option value="wild">wild</option>
      <option value="bold">bold</option>
      <option value="free">free</option>
      <option value="calm">calm</option>
      <option value="cozy">cozy</option>
      <option value="well">well</option>
      <option value="justbe">justbe</option>
      <option value="sativa">sativa</option>
      <option value="indica">indica</option>
      <option value="hybrid">hybrid</option>
      <option value="hashrosin">hashrosin</option>
      <option value="liveresin">liveresin</option>
      <option value="curedresin">curedresin</option>
    </select>
  </div>

  <div class="field-group">
    <label class="field-label">Strain / Flavor</label>
    <input type="text" id="strain" placeholder="fruitloops, orig, etc." />
  </div>

  <hr />
  <div class="subhead">File Details</div>

  <div class="field-group">
    <label class="field-label">Category</label>
    <select id="category">
      <option value="">— select —</option>
      <option value="packaging">packaging</option>
      <option value="marketing">marketing</option>
      <option value="photo">photo</option>
      <option value="dev">dev</option>
      <option value="admin">admin</option>
    </select>
  </div>

  <div class="field-group">
    <label class="field-label">Component</label>
    <select id="component">
      <option value="">— select —</option>
      <optgroup label="packaging">
        <option value="frontlabel">frontlabel</option>
        <option value="backlabel">backlabel</option>
        <option value="barcode">barcode</option>
        <option value="dieline">dieline</option>
        <option value="boxpanel">boxpanel</option>
        <option value="boxfull">boxfull</option>
        <option value="hangtag">hangtag</option>
        <option value="headercard">headercard</option>
        <option value="stickersheet">stickersheet</option>
        <option value="insert">insert</option>
        <option value="sleeve">sleeve</option>
        <option value="pouch">pouch</option>
      </optgroup>
      <optgroup label="marketing">
        <option value="social">social</option>
        <option value="printad">printad</option>
        <option value="sellsheet">sellsheet</option>
        <option value="banner">banner</option>
        <option value="signage">signage</option>
        <option value="email">email</option>
        <option value="menu">menu</option>
      </optgroup>
      <optgroup label="photo">
        <option value="product">product</option>
        <option value="lifestyle">lifestyle</option>
        <option value="detail">detail</option>
        <option value="raw">raw</option>
        <option value="edit">edit</option>
      </optgroup>
      <optgroup label="dev / admin">
        <option value="spec">spec</option>
        <option value="techpack">techpack</option>
        <option value="cert">cert</option>
        <option value="compliance">compliance</option>
        <option value="swatch">swatch</option>
      </optgroup>
    </select>
  </div>

  <div class="field-group">
    <label class="field-label">Size</label>
    <select id="size">
      <option value="na">na (none)</option>
      <option value="0p5g">0.5g</option>
      <option value="1g">1g</option>
      <option value="3p5g">3.5g</option>
      <option value="7g">7g</option>
      <option value="14g">14g</option>
      <option value="28g">28g</option>
      <option value="5pk">5pk</option>
      <option value="6pk">6pk</option>
      <option value="10pk">10pk</option>
      <option value="14pk">14pk</option>
      <option value="lgroll">lgroll</option>
      <option value="smroll">smroll</option>
      <option value="thermroll">thermroll</option>
      <option value="large">large</option>
      <option value="small">small</option>
      <option value="other">other (type below)</option>
    </select>
    <input type="text" id="size-other" placeholder="custom size" style="margin-top:6px; display:none;" />
  </div>

  <hr />
  <div class="subhead">Version &amp; Status</div>

  <div class="field-group">
    <label class="field-label">Status</label>
    <select id="status">
      <option value="wip">wip</option>
      <option value="review">review</option>
      <option value="final">final</option>
      <option value="printready">printready</option>
    </select>
  </div>

  <div class="field-group">
    <label class="field-label">Version</label>
    <select id="version">
      <option value="v01">v01</option>
      <option value="v02">v02</option>
      <option value="v03">v03</option>
      <option value="v04">v04</option>
      <option value="v05">v05</option>
      <option value="v06">v06</option>
      <option value="v07">v07</option>
      <option value="v08">v08</option>
      <option value="v09">v09</option>
      <option value="v10">v10</option>
    </select>
  </div>

  <div class="field-group">
    <label class="field-label">Date</label>
    <input type="date" id="date" />
  </div>

  <div class="output-box">
    <div class="output-label">Filename</div>
    <div class="filename" id="output">—</div>
    <button class="copy-btn" id="copy-btn"><i class="ti ti-copy" aria-hidden="true"></i> copy</button>
  </div>
</div>

<script>
const today = new Date();
const pad = n => String(n).padStart(2,'0');
document.getElementById('date').value = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

function clean(str) {
  return str.toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9]/g,'');
}
function getVal(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}
function buildFilename() {
  const brandSel = getVal('brand');
  const brandOther = getVal('brand-other');
  const brand = brandSel === 'retired' ? clean(brandOther) : clean(brandSel);
  const line = clean(getVal('line')) || 'na';
  const strainRaw = getVal('strain');
  const strain = strainRaw ? clean(strainRaw) : 'orig';
  const category = clean(getVal('category'));
  const component = clean(getVal('component'));
  const sizeSel = getVal('size');
  const sizeOther = getVal('size-other');
  const size = sizeSel === 'other' ? clean(sizeOther) : sizeSel;
  const status = clean(getVal('status'));
  const version = getVal('version');
  const dateRaw = getVal('date');
  const date = dateRaw ? dateRaw.replace(/-/g,'') : '';
  const parts = [brand, line, strain, component || category, size, status, version, date];
  document.getElementById('output').textContent = parts.filter(Boolean).join('_') || '—';
}

document.getElementById('brand').addEventListener('change', function() {
  document.getElementById('brand-other').style.display = this.value === 'retired' ? 'block' : 'none';
  buildFilename();
});
document.getElementById('size').addEventListener('change', function() {
  document.getElementById('size-other').style.display = this.value === 'other' ? 'block' : 'none';
  buildFilename();
});
['brand-other','line','strain','category','component','size-other','status','version','date'].forEach(id => {
  const el = document.getElementById(id);
  if (el) { el.addEventListener('input', buildFilename); el.addEventListener('change', buildFilename); }
});
document.getElementById('copy-btn').addEventListener('click', function() {
  const text = document.getElementById('output').textContent;
  if (text && text !== '—') {
    navigator.clipboard.writeText(text).then(() => {
      this.textContent = 'copied!';
      setTimeout(() => { this.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> copy'; }, 1500);
    });
  }
});
buildFilename();
</script>
