<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filename Builder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 12px;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 50px;
  }
  .page {
    max-width: 600px;
    margin: 0 auto;
    background: #fff;
    border: 0.5px solid #d8d6d0;
    border-radius: 12px;
    padding: 50px;
  }
  h1 { font-size: 30px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
  .subhead { font-size: 20px; font-weight: 700; margin: 28px 0 16px; letter-spacing: -0.3px; }
  hr { border: none; border-top: 0.5px solid #e0ded8; margin: 28px 0; }
  .field-group { margin-bottom: 18px; }
  .field-label { font-size: 12px; color: #666; font-weight: 500; margin-bottom: 6px; display: block; }

  .custom-select-wrap { position: relative; }
  .custom-select-trigger {
    width: 100%; padding: 8px 32px 8px 10px; font-size: 12px;
    border: 0.5px solid #c8c6c0; border-radius: 8px;
    background: #fff; color: #1a1a1a; font-family: inherit;
    cursor: pointer; text-align: left; display: flex;
    align-items: center; justify-content: space-between;
  }
  .custom-select-trigger:hover { border-color: #999; }
  .custom-select-trigger .arrow { font-size: 10px; color: #999; flex-shrink: 0; }
  .custom-dropdown {
    display: none; position: absolute; top: calc(100% + 4px);
    left: 0; right: 0; background: #fff;
    border: 0.5px solid #c8c6c0; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 100;
    max-height: 280px; overflow-y: auto;
  }
  .custom-dropdown.open { display: block; }
  .dropdown-group-label {
    font-size: 10px; font-weight: 600; color: #999;
    text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 10px 4px;
  }
  .dropdown-option {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px; cursor: pointer; font-size: 12px;
  }
  .dropdown-option:hover { background: #f5f4f0; }
  .dropdown-option.selected { font-weight: 500; }
  .dropdown-option .opt-label { flex: 1; }
  .opt-actions { display: none; gap: 4px; }
  .dropdown-option:hover .opt-actions { display: flex; }
  .opt-btn {
    padding: 2px 6px; font-size: 10px; border: 0.5px solid #ccc;
    border-radius: 4px; background: #fff; color: #555;
    cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .opt-btn:hover { background: #eee; }
  .opt-btn.danger:hover { background: #fee; color: #c00; border-color: #f99; }
  .dropdown-add {
    padding: 6px 10px; border-top: 0.5px solid #e8e6e0;
    display: flex; gap: 6px; align-items: center;
  }
  .dropdown-add input {
    flex: 1; padding: 5px 8px; font-size: 11px;
    border: 0.5px solid #ccc; border-radius: 6px;
    font-family: inherit; background: #faf9f7;
  }
  .dropdown-add input:focus { outline: none; border-color: #888; }
  .add-btn {
    padding: 5px 10px; font-size: 11px; border: 0.5px solid #ccc;
    border-radius: 6px; background: #fff; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }
  .add-btn:hover { background: #f0efe9; }
  .plain-input {
    width: 100%; padding: 8px 10px; font-size: 12px;
    border: 0.5px solid #c8c6c0; border-radius: 8px;
    background: #fff; color: #1a1a1a; font-family: inherit;
  }
  .plain-input:focus { outline: none; border-color: #888; }
  .plain-input.hidden { display: none; margin-top: 6px; }
  .output-box {
    background: #f5f4f0; border: 0.5px solid #d8d6d0;
    border-radius: 10px; padding: 20px 24px; margin-top: 28px;
  }
  .output-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .filename {
    font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    font-size: 13px; color: #1a1a1a; word-break: break-all;
    line-height: 1.6; min-height: 20px;
  }
  .copy-btn {
    margin-top: 12px; padding: 7px 16px; font-size: 12px;
    border: 0.5px solid #c8c6c0; border-radius: 8px;
    background: #fff; color: #1a1a1a; cursor: pointer; font-family: inherit;
  }
  .copy-btn:hover { background: #f0efe9; }
  .rename-input {
    flex: 1; padding: 2px 6px; font-size: 12px;
    border: 0.5px solid #888; border-radius: 4px; font-family: inherit;
  }
  .rename-input:focus { outline: none; }
  .reset-link {
    font-size: 11px; color: #aaa; text-decoration: underline;
    cursor: pointer; margin-top: 28px; display: inline-block;
  }
  .reset-link:hover { color: #c00; }

  /* Token UI */
  .token-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 24px; padding: 10px 14px;
    background: #faf9f7; border: 0.5px solid #e0ded8;
    border-radius: 8px;
  }
  .token-bar label { font-size: 11px; color: #888; white-space: nowrap; }
  .token-bar input {
    flex: 1; padding: 5px 8px; font-size: 11px;
    border: 0.5px solid #ccc; border-radius: 6px;
    font-family: inherit; background: #fff;
  }
  .token-bar input:focus { outline: none; border-color: #888; }
  .token-save-btn {
    padding: 5px 12px; font-size: 11px; border: 0.5px solid #ccc;
    border-radius: 6px; background: #fff; cursor: pointer; font-family: inherit;
  }
  .token-save-btn:hover { background: #f0efe9; }
  .token-status { font-size: 11px; color: #888; white-space: nowrap; }
  .token-status.ok { color: #4a9; }
  .token-status.err { color: #c44; }

  .sync-status {
    font-size: 10px; color: #aaa; margin-top: 6px; min-height: 14px;
    text-align: right;
  }
  .sync-status.saving { color: #888; }
  .sync-status.saved { color: #4a9; }
  .sync-status.err { color: #c44; }
  .no-edit-notice {
    font-size: 11px; color: #bbb; font-style: italic; margin-top: 4px;
  }
</style>
</head>
<body>
<div class="page">
  <h1>Filename Builder</h1>

  <div class="token-bar">
    <label>&#128274; Admin token</label>
    <input type="password" id="token-input" placeholder="paste your GitHub token to enable editing" />
    <button class="token-save-btn" id="token-save-btn">Save</button>
    <span class="token-status" id="token-status"></span>
  </div>

  <div class="subhead">Brand &amp; Product</div>

  <div class="field-group">
    <label class="field-label">Brand</label>
    <div class="custom-select-wrap" id="wrap-brand"></div>
    <input type="text" class="plain-input hidden" id="brand-other" placeholder="retired brand name" />
  </div>

  <div class="field-group">
    <label class="field-label">Line Designation</label>
    <div class="custom-select-wrap" id="wrap-line"></div>
  </div>

  <div class="field-group">
    <label class="field-label">Subject</label>
    <input type="text" class="plain-input" id="strain" placeholder="fruitloops, juneteenth, orig, etc." />
  </div>

  <hr />
  <div class="subhead">File Details</div>

  <div class="field-group">
    <label class="field-label">Category</label>
    <div class="custom-select-wrap" id="wrap-category"></div>
  </div>

  <div class="field-group">
    <label class="field-label">Component</label>
    <div class="custom-select-wrap" id="wrap-component"></div>
  </div>

  <div class="field-group">
    <label class="field-label">Size</label>
    <div class="custom-select-wrap" id="wrap-size"></div>
    <input type="text" class="plain-input hidden" id="size-other" placeholder="custom size" />
  </div>

  <hr />
  <div class="subhead">Version &amp; Status</div>

  <div class="field-group">
    <label class="field-label">Status</label>
    <div class="custom-select-wrap" id="wrap-status"></div>
  </div>

  <div class="field-group">
    <label class="field-label">Version</label>
    <div class="custom-select-wrap" id="wrap-version"></div>
  </div>

  <div class="field-group">
    <label class="field-label">Date</label>
    <input type="date" class="plain-input" id="date" />
  </div>

  <div class="output-box">
    <div class="output-label">Filename</div>
    <div class="filename" id="output">—</div>
    <button class="copy-btn" id="copy-btn">&#x2398; Copy</button>
  </div>

  <div class="sync-status" id="sync-status"></div>
  <div class="reset-link" id="reset-btn">Reset all dropdowns to defaults</div>
</div>

<script>
const GITHUB_USER = 'skaidrashiels';
const GITHUB_REPO = 'filename-builder';
const CONFIG_PATH = 'config.json';
const TOKEN_KEY = 'fb_gh_token';
const SELECTIONS_KEY = 'fb_selections';

const DEFAULTS = {
  brand: {
    flat: true,
    options: [
      { value: '', label: '— select —' },
      { value: 'walden', label: 'walden' },
      { value: 'waldentrailblazers', label: 'waldentrailblazers' },
      { value: 'waldenreserve', label: 'waldenreserve' },
      { value: 'waldenreservecarbonoffset', label: 'waldenreservecarbonoffset' },
      { value: 'waldensnowcaps', label: 'waldensnowcaps' },
      { value: 'bonbon', label: 'bonbon' },
      { value: 'batonsdebon bon', label: 'batonsdebon bon' },
      { value: 'plume', label: 'plume' },
      { value: 'plumeblunts', label: 'plumeblunts' },
      { value: 'cascadecrest', label: 'cascadecrest' },
      { value: 'cascadecrestvapes', label: 'cascadecrestvapes' },
      { value: 'cascadecrestcrush', label: 'cascadecrestcrush' },
      { value: 'cascadecrestmellows', label: 'cascadecrestmellows' },
      { value: 'puffy', label: 'puffy' },
      { value: 'puffysodashoppe', label: 'puffysodashoppe' },
      { value: 'shotskis', label: 'shotskis' },
      { value: 'thedrink', label: 'thedrink' },
      { value: 'retired', label: 'retired brand (type below)' }
    ]
  },
  line: {
    flat: true,
    options: [
      { value: 'na', label: 'na (none)' },
      { value: 'wild', label: 'wild' },
      { value: 'bold', label: 'bold' },
      { value: 'free', label: 'free' },
      { value: 'calm', label: 'calm' },
      { value: 'cozy', label: 'cozy' },
      { value: 'well', label: 'well' },
      { value: 'justbe', label: 'justbe' },
      { value: 'sativa', label: 'sativa' },
      { value: 'indica', label: 'indica' },
      { value: 'hybrid', label: 'hybrid' },
      { value: 'hashrosin', label: 'hashrosin' },
      { value: 'liveresin', label: 'liveresin' },
      { value: 'curedresin', label: 'curedresin' }
    ]
  },
  category: {
    flat: true,
    options: [
      { value: '', label: '— select —' },
      { value: 'packaging', label: 'packaging' },
      { value: 'marketing', label: 'marketing' },
      { value: 'photo', label: 'photo' },
      { value: 'asset', label: 'asset' },
      { value: 'dev', label: 'dev' },
      { value: 'admin', label: 'admin' }
    ]
  },
  component: {
    flat: false,
    groups: [
      { label: 'packaging', options: [
        { value: 'frontlabel', label: 'frontlabel' },
        { value: 'backlabel', label: 'backlabel' },
        { value: 'barcode', label: 'barcode' },
        { value: 'dieline', label: 'dieline' },
        { value: 'boxpanel', label: 'boxpanel' },
        { value: 'boxfull', label: 'boxfull' },
        { value: 'hangtag', label: 'hangtag' },
        { value: 'headercard', label: 'headercard' },
        { value: 'stickersheet', label: 'stickersheet' },
        { value: 'insert', label: 'insert' },
        { value: 'sleeve', label: 'sleeve' },
        { value: 'pouch', label: 'pouch' }
      ]},
      { label: 'marketing', options: [
        { value: 'social', label: 'social' },
        { value: 'printad', label: 'printad' },
        { value: 'sellsheet', label: 'sellsheet' },
        { value: 'banner', label: 'banner' },
        { value: 'signage', label: 'signage' },
        { value: 'poster', label: 'poster' },
        { value: 'email', label: 'email' },
        { value: 'menu', label: 'menu' }
      ]},
      { label: 'photo', options: [
        { value: 'product', label: 'product' },
        { value: 'lifestyle', label: 'lifestyle' },
        { value: 'detail', label: 'detail' },
        { value: 'raw', label: 'raw' },
        { value: 'edit', label: 'edit' }
      ]},
      { label: 'asset', options: [
        { value: 'background', label: 'background' },
        { value: 'texture', label: 'texture' },
        { value: 'icon', label: 'icon' },
        { value: 'illustration', label: 'illustration' }
      ]},
      { label: 'dev / admin', options: [
        { value: 'spec', label: 'spec' },
        { value: 'techpack', label: 'techpack' },
        { value: 'cert', label: 'cert' },
        { value: 'compliance', label: 'compliance' },
        { value: 'swatch', label: 'swatch' }
      ]}
    ]
  },
  size: {
    flat: true,
    options: [
      { value: 'na', label: 'na (none)' },
      { value: '0p5g', label: '0.5g' },
      { value: '1g', label: '1g' },
      { value: '3p5g', label: '3.5g' },
      { value: '7g', label: '7g' },
      { value: '14g', label: '14g' },
      { value: '28g', label: '28g' },
      { value: '5pk', label: '5pk' },
      { value: '6pk', label: '6pk' },
      { value: '10pk', label: '10pk' },
      { value: '14pk', label: '14pk' },
      { value: 'lgroll', label: 'lgroll' },
      { value: 'smroll', label: 'smroll' },
      { value: 'thermroll', label: 'thermroll' },
      { value: 'large', label: 'large' },
      { value: 'small', label: 'small' },
      { value: 'other', label: 'other (type below)' }
    ]
  },
  status: {
    flat: true,
    options: [
      { value: 'na', label: 'na (none)' },
      { value: 'wip', label: 'wip' },
      { value: 'review', label: 'review' },
      { value: 'final', label: 'final' },
      { value: 'printready', label: 'printready' }
    ]
  },
  version: {
    flat: true,
    options: [
      { value: 'v01', label: 'v01' },{ value: 'v02', label: 'v02' },
      { value: 'v03', label: 'v03' },{ value: 'v04', label: 'v04' },
      { value: 'v05', label: 'v05' },{ value: 'v06', label: 'v06' },
      { value: 'v07', label: 'v07' },{ value: 'v08', label: 'v08' },
      { value: 'v09', label: 'v09' },{ value: 'v10', label: 'v10' }
    ]
  }
};

let config = null; // loaded from GitHub
let configSha = null; // needed to write back to GitHub
let state = {}; // selected values only, saved to localStorage
let token = localStorage.getItem(TOKEN_KEY) || '';
let canEdit = false;
let saveTimer = null;

// --- Token UI ---
const tokenInput = document.getElementById('token-input');
const tokenStatus = document.getElementById('token-status');
if (token) { tokenInput.value = token; tokenStatus.textContent = 'token saved'; tokenStatus.className = 'token-status ok'; canEdit = true; }

document.getElementById('token-save-btn').addEventListener('click', () => {
  const val = tokenInput.value.trim();
  if (!val) { localStorage.removeItem(TOKEN_KEY); token = ''; canEdit = false; tokenStatus.textContent = 'cleared'; tokenStatus.className = 'token-status'; return; }
  localStorage.setItem(TOKEN_KEY, val);
  token = val; canEdit = true;
  tokenStatus.textContent = 'token saved';
  tokenStatus.className = 'token-status ok';
  renderAll();
});

// --- GitHub API ---
async function loadConfigFromGitHub() {
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${CONFIG_PATH}`, {
      headers: { 'Accept': 'application/vnd.github+json' }
    });
    if (res.status === 404) {
      // config.json doesn't exist yet, use defaults
      config = JSON.parse(JSON.stringify(DEFAULTS));
      configSha = null;
      return;
    }
    const data = await res.json();
    configSha = data.sha;
    config = JSON.parse(atob(data.content.replace(/\n/g, '')));
  } catch(e) {
    config = JSON.parse(JSON.stringify(DEFAULTS));
    configSha = null;
  }
}

async function saveConfigToGitHub() {
  if (!token) return;
  setSyncStatus('saving', 'saving…');
  try {
    const body = {
      message: 'Update filename builder config',
      content: btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2)))),
    };
    if (configSha) body.sha = configSha;
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${CONFIG_PATH}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (res.ok) {
      configSha = data.content.sha;
      setSyncStatus('saved', 'saved to GitHub ✓');
      setTimeout(() => setSyncStatus('', ''), 3000);
    } else {
      setSyncStatus('err', 'save failed: ' + (data.message || res.status));
    }
  } catch(e) {
    setSyncStatus('err', 'save failed: ' + e.message);
  }
}

function setSyncStatus(cls, msg) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-status' + (cls ? ' ' + cls : '');
  el.textContent = msg;
}

function scheduleSave() {
  if (!canEdit) return;
  if (saveTimer) clearTimeout(saveTimer);
  setSyncStatus('saving', 'pending save…');
  saveTimer = setTimeout(() => saveConfigToGitHub(), 1200);
}

// --- State (selections only) ---
function loadSelections() {
  try {
    const saved = localStorage.getItem(SELECTIONS_KEY);
    if (saved) state = JSON.parse(saved);
    else {
      Object.keys(DEFAULTS).forEach(k => { state[k] = getDefaultSelected(k, config[k]); });
    }
  } catch(e) {
    Object.keys(DEFAULTS).forEach(k => { state[k] = getDefaultSelected(k, config[k]); });
  }
}

function saveSelections() {
  localStorage.setItem(SELECTIONS_KEY, JSON.stringify(state));
}

function getDefaultSelected(k, cfg) {
  if (!cfg) return '';
  if (cfg.flat) return cfg.options[0]?.value || '';
  return '';
}

function getAllOptions(fieldKey) {
  const d = config[fieldKey];
  if (!d) return [];
  if (d.flat) return d.options;
  return d.groups.flatMap(g => g.options);
}

function clean(str) {
  return str.toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9]/g,'');
}

function buildFilename() {
  if (!config) return;
  const brand = state.brand === 'retired'
    ? clean(document.getElementById('brand-other').value)
    : clean(state.brand || '');
  const line = clean(state.line || '') || 'na';
  const strainRaw = document.getElementById('strain').value.trim();
  const strain = strainRaw ? clean(strainRaw) : 'orig';
  const category = clean(state.category || '');
  const component = clean(state.component || '');
  const size = state.size === 'other'
    ? clean(document.getElementById('size-other').value)
    : (state.size || '');
  const status = clean(state.status || '');
  const version = state.version || '';
  const dateRaw = document.getElementById('date').value;
  const date = dateRaw ? dateRaw.replace(/-/g,'') : '';
  const parts = [brand, line, strain, component || category, size, status, version, date];
  document.getElementById('output').textContent = parts.filter(Boolean).join('_') || '—';
}

function renderSelect(fieldKey) {
  const wrap = document.getElementById('wrap-' + fieldKey);
  if (!wrap || !config[fieldKey]) return;
  wrap.innerHTML = '';

  const d = config[fieldKey];
  const selected = state[fieldKey] || '';

  const selectedLabel = (() => {
    const all = getAllOptions(fieldKey);
    const found = all.find(o => o.value === selected);
    return found ? found.label : (selected || '— select —');
  })();

  const trigger = document.createElement('button');
  trigger.className = 'custom-select-trigger';
  trigger.innerHTML = `<span class="opt-label">${selectedLabel}</span><span class="arrow">&#9660;</span>`;
  wrap.appendChild(trigger);

  const dropdown = document.createElement('div');
  dropdown.className = 'custom-dropdown';

  const renderOptions = () => {
    dropdown.innerHTML = '';

    const renderOpt = (opt, groupLabel) => {
      const row = document.createElement('div');
      row.className = 'dropdown-option' + (opt.value === selected ? ' selected' : '');

      const labelSpan = document.createElement('span');
      labelSpan.className = 'opt-label';
      labelSpan.textContent = opt.label;

      row.appendChild(labelSpan);

      if (canEdit) {
        const actions = document.createElement('div');
        actions.className = 'opt-actions';

        const renameBtn = document.createElement('button');
        renameBtn.className = 'opt-btn';
        renameBtn.textContent = 'rename';
        renameBtn.onclick = (e) => {
          e.stopPropagation();
          labelSpan.style.display = 'none';
          actions.style.display = 'none';
          const inp = document.createElement('input');
          inp.className = 'rename-input';
          inp.value = opt.label;
          inp.onclick = e => e.stopPropagation();
          const saveBtn = document.createElement('button');
          saveBtn.className = 'opt-btn';
          saveBtn.textContent = 'save';
          saveBtn.onclick = (e2) => {
            e2.stopPropagation();
            const newLabel = inp.value.trim();
            if (!newLabel) return;
            opt.label = newLabel;
            if (opt.value === selected) trigger.querySelector('.opt-label').textContent = newLabel;
            scheduleSave();
            renderOptions();
          };
          inp.onkeydown = (e2) => { if (e2.key === 'Enter') saveBtn.click(); };
          row.appendChild(inp);
          row.appendChild(saveBtn);
          inp.focus(); inp.select();
        };

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'opt-btn danger';
        deleteBtn.textContent = 'delete';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          if (!window.confirm(`Delete "${opt.label}"?`)) return;
          if (d.flat) {
            d.options = d.options.filter(o => o !== opt);
          } else {
            const grp = d.groups.find(g => g.label === groupLabel);
            if (grp) grp.options = grp.options.filter(o => o !== opt);
          }
          if (state[fieldKey] === opt.value) {
            state[fieldKey] = getAllOptions(fieldKey)[0]?.value || '';
            saveSelections();
          }
          scheduleSave();
          renderSelect(fieldKey);
          buildFilename();
        };

        actions.appendChild(renameBtn);
        actions.appendChild(deleteBtn);
        row.appendChild(actions);
      }

      row.addEventListener('click', () => {
        state[fieldKey] = opt.value;
        trigger.querySelector('.opt-label').textContent = opt.label;
        saveSelections();
        dropdown.classList.remove('open');
        if (fieldKey === 'brand') {
          document.getElementById('brand-other').classList.toggle('hidden', opt.value !== 'retired');
        }
        if (fieldKey === 'size') {
          document.getElementById('size-other').classList.toggle('hidden', opt.value !== 'other');
        }
        buildFilename();
      });

      dropdown.appendChild(row);
    };

    if (d.flat) {
      d.options.forEach(opt => renderOpt(opt, null));
    } else {
      d.groups.forEach(grp => {
        const lbl = document.createElement('div');
        lbl.className = 'dropdown-group-label';
        lbl.textContent = grp.label;
        dropdown.appendChild(lbl);
        grp.options.forEach(opt => renderOpt(opt, grp.label));
      });
    }

    if (canEdit) {
      const addRow = document.createElement('div');
      addRow.className = 'dropdown-add';
      const addInput = document.createElement('input');
      addInput.placeholder = 'add new option…';
      addInput.onclick = e => e.stopPropagation();

      if (!d.flat) {
        const groupSelect = document.createElement('select');
        groupSelect.style.cssText = 'padding:4px 6px;font-size:11px;border:0.5px solid #ccc;border-radius:6px;font-family:inherit;background:#faf9f7;';
        groupSelect.onclick = e => e.stopPropagation();
        d.groups.forEach(g => {
          const o = document.createElement('option');
          o.value = g.label; o.textContent = g.label;
          groupSelect.appendChild(o);
        });
        addRow.appendChild(groupSelect);
        addRow.appendChild(addInput);
        const addBtn = document.createElement('button');
        addBtn.className = 'add-btn';
        addBtn.textContent = '+ add';
        addBtn.onclick = (e) => {
          e.stopPropagation();
          const val = clean(addInput.value.trim());
          const lbl = addInput.value.trim();
          if (!val) return;
          const grp = d.groups.find(g => g.label === groupSelect.value);
          if (grp) grp.options.push({ value: val, label: lbl });
          addInput.value = '';
          scheduleSave();
          renderOptions();
        };
        addInput.onkeydown = (e) => { if (e.key === 'Enter') addBtn.click(); };
        addRow.appendChild(addBtn);
      } else {
        addRow.appendChild(addInput);
        const addBtn = document.createElement('button');
        addBtn.className = 'add-btn';
        addBtn.textContent = '+ add';
        addBtn.onclick = (e) => {
          e.stopPropagation();
          const val = clean(addInput.value.trim());
          const lbl = addInput.value.trim();
          if (!val) return;
          d.options.push({ value: val, label: lbl });
          addInput.value = '';
          scheduleSave();
          renderOptions();
        };
        addInput.onkeydown = (e) => { if (e.key === 'Enter') addBtn.click(); };
        addRow.appendChild(addBtn);
      }
      dropdown.appendChild(addRow);
    } else {
      const notice = document.createElement('div');
      notice.className = 'no-edit-notice';
      notice.style.padding = '8px 10px';
      notice.textContent = 'Enter admin token to edit options';
      dropdown.appendChild(notice);
    }
  };

  renderOptions();
  wrap.appendChild(dropdown);

  trigger.addEventListener('click', (e) => {
    e.stopPropagation();
    const wasOpen = dropdown.classList.contains('open');
    document.querySelectorAll('.custom-dropdown.open').forEach(d => d.classList.remove('open'));
    if (!wasOpen) dropdown.classList.add('open');
  });
}

function renderAll() {
  if (!config) return;
  Object.keys(DEFAULTS).forEach(k => renderSelect(k));
  document.getElementById('brand-other').classList.add('hidden');
  document.getElementById('size-other').classList.add('hidden');
  buildFilename();
}

document.addEventListener('click', () => {
  document.querySelectorAll('.custom-dropdown.open').forEach(d => d.classList.remove('open'));
});

document.getElementById('strain').addEventListener('input', buildFilename);
document.getElementById('brand-other').addEventListener('input', buildFilename);
document.getElementById('size-other').addEventListener('input', buildFilename);
document.getElementById('date').addEventListener('change', buildFilename);

document.getElementById('copy-btn').addEventListener('click', function() {
  const text = document.getElementById('output').textContent;
  if (text && text !== '—') {
    navigator.clipboard.writeText(text).then(() => {
      this.textContent = 'Copied!';
      setTimeout(() => { this.textContent = '⌘ Copy'; }, 1500);
    });
  }
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!canEdit) { alert('Admin token required to reset defaults.'); return; }
  if (!window.confirm('Reset all dropdowns to defaults? This will overwrite your saved config on GitHub.')) return;
  config = JSON.parse(JSON.stringify(DEFAULTS));
  Object.keys(DEFAULTS).forEach(k => { state[k] = getDefaultSelected(k, config[k]); });
  saveSelections();
  scheduleSave();
  renderAll();
});

const today = new Date();
const pad = n => String(n).padStart(2,'0');
document.getElementById('date').value = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

// Boot
(async () => {
  setSyncStatus('saving', 'loading config…');
  await loadConfigFromGitHub();
  // If config is empty or missing keys, seed from defaults and save
  const hasKeys = config && Object.keys(config).length > 0 && config.brand;
  if (!hasKeys) {
    config = JSON.parse(JSON.stringify(DEFAULTS));
    if (token) await saveConfigToGitHub();
  }
  loadSelections();
  renderAll();
  setSyncStatus('', '');
})();
</script>
</body>
</html>
